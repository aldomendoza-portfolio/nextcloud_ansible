---
- name: Instalar dependencias requeridas para Docker
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - apt-transport-https
    state: present
    update_cache: yes

- name: Crear directorio para la llave del repositorio Docker
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Descargar llave GPG oficial de Docker
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Obtener arquitectura del sistema
  command: dpkg --print-architecture
  register: architecture
  changed_when: false

- name: Obtener nombre en clave de la distribución
  command: lsb_release -cs
  register: lsb_release
  changed_when: false

- name: Agregar el repositorio de Docker a las fuentes de apt
  copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: |
      deb [arch={{ architecture.stdout }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ lsb_release.stdout }} stable
    mode: '0644'

- name: Instalar Docker y Docker Compose
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Asegurar que el servicio de Docker esté corriendo y habilitado
  service:
    name: docker
    state: started
    enabled: yes

- name: Agregar el usuario creado al grupo docker
  user:
    name: "{{ new_user }}"
    groups: docker
    append: yes
